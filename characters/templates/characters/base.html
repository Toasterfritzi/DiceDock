<!DOCTYPE html>
<html class="dark" lang="de">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>{% block title %}DiceDock{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#a855f7",
                        "primary-glow": "#c084fc",
                        "background-dark": "#050608",
                        "glass-border": "rgba(255, 255, 255, 0.08)",
                        "glass-bg": "rgba(15, 17, 21, 0.35)",
                        "neon-purple": "#a855f7",
                        "neon-pink": "#ec4899",
                        "neon-blue": "#3b82f6",
                        "neon-cyan": "#06b6d4",
                        "neon-green": "#22c55e",
                    },
                    fontFamily: {
                        sans: ["Outfit", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.75rem",
                        xl: "1rem",
                        '2xl': "1.5rem",
                        '3xl': "2rem",
                    },
                    boxShadow: {
                        'neon-purple': '0 0 10px rgba(168, 85, 247, 0.3), 0 0 20px rgba(168, 85, 247, 0.1)',
                        'neon-blue': '0 0 10px rgba(59, 130, 246, 0.3), 0 0 20px rgba(59, 130, 246, 0.1)',
                        'neon-green': '0 0 10px rgba(34, 197, 94, 0.3), 0 0 20px rgba(34, 197, 94, 0.1)',
                    },
                    animation: {
                        'pulse-slow': 'pulse 6s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 8s ease-in-out infinite',
                        'float-delayed': 'float 9s ease-in-out 1s infinite',
                        'orb-move': 'orb-move 20s infinite alternate',
                        'shimmer': 'shimmer 2.5s infinite linear',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-15px)' },
                        },
                        'orb-move': {
                            '0%': { transform: 'translate(0, 0) scale(1)' },
                            '33%': { transform: 'translate(50px, -30px) scale(1.1)' },
                            '66%': { transform: 'translate(-30px, 40px) scale(0.95)' },
                            '100%': { transform: 'translate(20px, -20px) scale(1.05)' },
                        },
                        shimmer: {
                            '0%': { backgroundPosition: '-1000px 0' },
                            '100%': { backgroundPosition: '1000px 0' }
                        }
                    }
                },
            },
        };
    </script>
    <style>
        body {
            background-color: #050608;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        /* ── 3D Würfel ── */
        .dice-scene {
            width: 32px;
            height: 32px;
            perspective: 200px;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
        }

        .dice-cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.15s ease-out;
        }

        .dice-cube.rolling {
            transition: none;
            animation: dice-tumble 1.2s cubic-bezier(0.2, 0.8, 0.3, 1) forwards;
        }

        .dice-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1025 0%, #0f0a1e 100%);
            border: 1.5px solid rgba(168, 85, 247, 0.5);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 8px rgba(168, 85, 247, 0.15), 0 0 6px rgba(168, 85, 247, 0.2);
            backface-visibility: hidden;
        }

        .dice-face svg {
            width: 22px;
            height: 22px;
        }

        .dice-dot {
            fill: #c084fc;
        }

        .dice-face--1 {
            transform: rotateY(0deg) translateZ(16px);
        }

        .dice-face--2 {
            transform: rotateY(180deg) translateZ(16px);
        }

        .dice-face--3 {
            transform: rotateY(90deg) translateZ(16px);
        }

        .dice-face--4 {
            transform: rotateY(-90deg) translateZ(16px);
        }

        .dice-face--5 {
            transform: rotateX(90deg) translateZ(16px);
        }

        .dice-face--6 {
            transform: rotateX(-90deg) translateZ(16px);
        }

        /* Each roll lands on a specific face via a named keyframe */
        @keyframes dice-tumble {
            0% {
                transform: rotateX(0) rotateY(0) rotateZ(0);
            }

            30% {
                transform: rotateX(400deg) rotateY(300deg) rotateZ(100deg);
            }

            60% {
                transform: rotateX(600deg) rotateY(500deg) rotateZ(200deg);
            }

            /* 100% is set dynamically via JS */
        }

        /* Dice rain (Konami) */
        #dice-rain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }

        .rain-die {
            position: absolute;
            top: -60px;
            font-size: 2.2rem;
            animation: rain-fall linear forwards;
            opacity: 0.85;
        }

        @keyframes rain-fall {
            to {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }

        .bg-obsidian {
            background-color: #050608;
            background-image:
                radial-gradient(at 10% 10%, rgba(88, 28, 135, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(30, 64, 175, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
        }

        .glass-panel {
            background: rgba(20, 22, 28, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-panel:hover {
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.5),
                inset 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .glass-highlight {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.15);
        }

        .text-glow-purple {
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.6);
        }

        .text-glow-blue {
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
        }

        .text-glow-green {
            text-shadow: 0 0 15px rgba(34, 197, 94, 0.6);
        }

        .text-glow-cyan {
            text-shadow: 0 0 15px rgba(6, 182, 212, 0.6);
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            z-index: -1;
            opacity: 0.5;
            pointer-events: none;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .refraction-edge {
            position: relative;
            overflow: hidden;
        }

        .refraction-edge::before {
            content: '';
            position: absolute;
            top: 0;
            left: -50%;
            width: 200%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.03), transparent);
            transform: skewX(-25deg);
            pointer-events: none;
            transition: 0.5s;
        }

        .refraction-edge:hover::before {
            transform: skewX(-25deg) translateX(50%);
        }

        .glass-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            font-size: 1rem;
            transition: all 0.3s ease;
            width: 100%;
        }

        .glass-input:focus {
            outline: none;
            border-color: rgba(168, 85, 247, 0.5);
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.2);
            background: rgba(0, 0, 0, 0.4);
        }
    </style>
</head>

<body class="bg-obsidian min-h-screen flex flex-col font-sans selection:bg-neon-purple selection:text-white">
    <!-- Liquid Orbs Background -->
    <div class="orb w-[600px] h-[600px] bg-purple-600/30 top-[-100px] left-[-100px] animate-orb-move"></div>
    <div class="orb w-[500px] h-[500px] bg-blue-600/30 bottom-[10%] right-[-100px] animate-orb-move"
        style="animation-delay: -5s;"></div>
    <div class="orb w-[400px] h-[400px] bg-cyan-500/20 top-[40%] left-[30%] animate-pulse-slow"></div>

    <nav class="fixed top-0 w-full z-50 px-6 py-4">
        <div
            class="glass-panel max-w-7xl mx-auto rounded-xl px-6 py-3 flex justify-between items-center refraction-edge">
            <a href="{% url 'dashboard' %}" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
                <!-- 3D Würfel Easter Egg -->
                <div class="dice-scene" id="dice-scene" onclick="rollDice(event)" title="Würfeln!">
                    <div class="dice-cube" id="dice-cube">
                        <!-- Seite 1: ein Punkt -->
                        <div class="dice-face dice-face--1"><svg viewBox="0 0 50 50">
                                <circle class="dice-dot" cx="25" cy="25" r="5" />
                            </svg></div>
                        <!-- Seite 2: zwei Punkte -->
                        <div class="dice-face dice-face--2"><svg viewBox="0 0 50 50">
                                <circle class="dice-dot" cx="15" cy="15" r="4.5" />
                                <circle class="dice-dot" cx="35" cy="35" r="4.5" />
                            </svg></div>
                        <!-- Seite 3: drei Punkte -->
                        <div class="dice-face dice-face--3"><svg viewBox="0 0 50 50">
                                <circle class="dice-dot" cx="15" cy="15" r="4.5" />
                                <circle class="dice-dot" cx="25" cy="25" r="4.5" />
                                <circle class="dice-dot" cx="35" cy="35" r="4.5" />
                            </svg></div>
                        <!-- Seite 4: vier Punkte -->
                        <div class="dice-face dice-face--4"><svg viewBox="0 0 50 50">
                                <circle class="dice-dot" cx="15" cy="15" r="4.5" />
                                <circle class="dice-dot" cx="35" cy="15" r="4.5" />
                                <circle class="dice-dot" cx="15" cy="35" r="4.5" />
                                <circle class="dice-dot" cx="35" cy="35" r="4.5" />
                            </svg></div>
                        <!-- Seite 5: fünf Punkte -->
                        <div class="dice-face dice-face--5"><svg viewBox="0 0 50 50">
                                <circle class="dice-dot" cx="13" cy="13" r="4" />
                                <circle class="dice-dot" cx="37" cy="13" r="4" />
                                <circle class="dice-dot" cx="25" cy="25" r="4" />
                                <circle class="dice-dot" cx="13" cy="37" r="4" />
                                <circle class="dice-dot" cx="37" cy="37" r="4" />
                            </svg></div>
                        <!-- Seite 6: sechs Punkte -->
                        <div class="dice-face dice-face--6"><svg viewBox="0 0 50 50">
                                <circle class="dice-dot" cx="15" cy="12" r="4" />
                                <circle class="dice-dot" cx="35" cy="12" r="4" />
                                <circle class="dice-dot" cx="15" cy="25" r="4" />
                                <circle class="dice-dot" cx="35" cy="25" r="4" />
                                <circle class="dice-dot" cx="15" cy="38" r="4" />
                                <circle class="dice-dot" cx="35" cy="38" r="4" />
                            </svg></div>
                    </div>
                </div>
                <span
                    class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white via-purple-200 to-white tracking-tight text-glow-purple">DiceDock</span>
            </a>
            <div class="flex items-center gap-6 text-sm font-medium">
                {% if user.is_authenticated %}
                <span class="text-gray-300 hidden md:inline">Willkommen, {{ user.username }}!</span>
                <form action="{% url 'logout' %}" method="post" class="inline">
                    {% csrf_token %}
                    <button type="submit"
                        class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 text-gray-300 hover:text-white transition-all text-xs font-semibold uppercase tracking-wider flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm">logout</span> Abmelden
                    </button>
                </form>
                {% else %}
                <a href="{% url 'login' %}"
                    class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 text-gray-300 hover:text-white transition-all text-xs font-semibold uppercase tracking-wider">Anmelden</a>
                <a href="{% url 'register' %}"
                    class="px-4 py-2 rounded-lg bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 text-white transition-all text-xs font-semibold uppercase tracking-wider shadow-[0_0_15px_rgba(168,85,247,0.4)] hover:shadow-[0_0_25px_rgba(168,85,247,0.6)]">Registrieren</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="flex-grow flex flex-col justify-start p-6 pt-32 pb-12 w-full max-w-7xl mx-auto relative z-10 gap-6">
        {% block content %}
        {% endblock %}
    </main>
    {% block extra_scripts %}{% endblock %}

    <!-- Konami Dice Rain Overlay -->
    <div id="dice-rain"></div>

    <script>
        // ── 3D Würfel ────────────────────────────────────────────────────────────
        // Rotation die jede Seite nach vorne bringt
        const FACE_ROTATIONS = {
            1: 'rotateX(0deg)   rotateY(0deg)',
            2: 'rotateX(0deg)   rotateY(180deg)',
            3: 'rotateX(0deg)   rotateY(-90deg)',
            4: 'rotateX(0deg)   rotateY(90deg)',
            5: 'rotateX(-90deg) rotateY(0deg)',
            6: 'rotateX(90deg)  rotateY(0deg)',
        };
        let isRolling = false;

        function rollDice(e) {
            e.preventDefault();
            e.stopPropagation();
            if (isRolling) return;
            isRolling = true;

            const cube = document.getElementById('dice-cube');
            const result = Math.floor(Math.random() * 6) + 1;

            // Mehrere volle Drehungen + finale Position
            const spinsX = (3 + Math.floor(Math.random() * 3)) * 360;
            const spinsY = (3 + Math.floor(Math.random() * 3)) * 360;
            const finalRot = FACE_ROTATIONS[result];

            // Keyframe-Animation dynamisch erstellen
            const animName = 'roll-' + Date.now();
            const style = document.createElement('style');
            style.textContent = `
            @keyframes ${animName} {
                0%   { transform: rotateX(0) rotateY(0); }
                40%  { transform: rotateX(${spinsX * 0.6}deg) rotateY(${spinsY * 0.6}deg); }
                70%  { transform: rotateX(${spinsX * 0.85}deg) rotateY(${spinsY * 0.85}deg); }
                100% { transform: ${finalRot}; }
            }
        `;
            document.head.appendChild(style);

            cube.style.animation = 'none';
            void cube.offsetWidth;
            cube.style.animation = `${animName} 1.1s cubic-bezier(0.2, 0.8, 0.3, 1) forwards`;

            setTimeout(() => {
                cube.style.animation = 'none';
                cube.style.transform = finalRot;
                style.remove();
                isRolling = false;
            }, 1200);
        }

        // ── Konami-Code → Würfelregen ────────────────────────────────────────────
        const KONAMI = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown',
            'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'];
        let konamiIdx = 0;

        document.addEventListener('keydown', (e) => {
            if (e.key === KONAMI[konamiIdx]) {
                konamiIdx++;
                if (konamiIdx === KONAMI.length) {
                    konamiIdx = 0;
                    triggerDiceRain();
                }
            } else {
                konamiIdx = e.key === KONAMI[0] ? 1 : 0;
            }
        });

        function triggerDiceRain() {
            const rain = document.getElementById('dice-rain');
            const symbols = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅', '🎲'];
            const colors = ['#a855f7', '#3b82f6', '#06b6d4', '#22c55e', '#f59e0b', '#ec4899'];
            let count = 0;
            const interval = setInterval(() => {
                if (count++ > 60) { clearInterval(interval); return; }
                const el = document.createElement('span');
                el.className = 'rain-die';
                el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                el.style.left = `${Math.random() * 100}vw`;
                el.style.color = colors[Math.floor(Math.random() * colors.length)];
                const dur = 1.4 + Math.random() * 2;
                el.style.animationDuration = `${dur}s`;
                el.style.animationDelay = `${Math.random() * 0.8}s`;
                el.style.fontSize = `${1.5 + Math.random() * 2}rem`;
                el.style.filter = `drop-shadow(0 0 8px currentColor)`;
                rain.appendChild(el);
                setTimeout(() => el.remove(), (dur + 1) * 1000);
            }, 60);
        }
    </script>
</body>

</html>
