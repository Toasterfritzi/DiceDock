<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DiceDock{% endblock %}</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #1e1e1e;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        header a {
            color: #bb86fc;
            text-decoration: none;
            font-weight: bold;
        }
        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background-color: #1e1e1e;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        h1, h2 {
            color: #ffffff;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        form p {
            margin-bottom: 1rem;
        }
        input[type="text"], input[type="password"], input[type="email"], select, textarea {
            width: 100%;
            padding: 0.5rem;
            margin-top: 0.25rem;
            background-color: #2c2c2c;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
        }
        button {
            padding: 0.75rem 1.5rem;
            background-color: #bb86fc;
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 1rem;
        }
        button:hover {
            background-color: #9965f4;
        }
        .errorlist {
            color: #cf6679;
            list-style-type: none;
            padding: 0;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="{% url 'dashboard' %}" style="font-size: 1.5rem;">DiceDock</a>
        </div>
        <nav>
            {% if user.is_authenticated %}
                <span>Welcome, {{ user.username }}!</span>
                <form action="{% url 'logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" style="padding: 0.25rem 0.5rem; margin-left: 1rem;">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Login</a> | 
                <a href="{% url 'register' %}">Register</a>
            {% endif %}
        </nav>
    </header>
    
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
