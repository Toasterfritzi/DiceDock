<!DOCTYPE html>
<html class="dark" lang="de">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>{% block title %}DiceDock{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#a855f7",
                        "primary-glow": "#c084fc",
                        "background-dark": "#050608",
                        "glass-border": "rgba(255, 255, 255, 0.08)",
                        "glass-bg": "rgba(15, 17, 21, 0.35)",
                        "neon-purple": "#a855f7",
                        "neon-pink": "#ec4899",
                        "neon-blue": "#3b82f6",
                        "neon-cyan": "#06b6d4",
                        "neon-green": "#22c55e",
                    },
                    fontFamily: {
                        sans: ["Outfit", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.75rem",
                        xl: "1rem",
                        '2xl': "1.5rem",
                        '3xl': "2rem",
                    },
                    boxShadow: {
                        'neon-purple': '0 0 10px rgba(168, 85, 247, 0.3), 0 0 20px rgba(168, 85, 247, 0.1)',
                        'neon-blue': '0 0 10px rgba(59, 130, 246, 0.3), 0 0 20px rgba(59, 130, 246, 0.1)',
                        'neon-green': '0 0 10px rgba(34, 197, 94, 0.3), 0 0 20px rgba(34, 197, 94, 0.1)',
                    },
                    animation: {
                        'pulse-slow': 'pulse 6s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 8s ease-in-out infinite',
                        'float-delayed': 'float 9s ease-in-out 1s infinite',
                        'orb-move': 'orb-move 20s infinite alternate',
                        'shimmer': 'shimmer 2.5s infinite linear',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-15px)' },
                        },
                        'orb-move': {
                            '0%': { transform: 'translate(0, 0) scale(1)' },
                            '33%': { transform: 'translate(50px, -30px) scale(1.1)' },
                            '66%': { transform: 'translate(-30px, 40px) scale(0.95)' },
                            '100%': { transform: 'translate(20px, -20px) scale(1.05)' },
                        },
                        shimmer: {
                            '0%': { backgroundPosition: '-1000px 0' },
                            '100%': { backgroundPosition: '1000px 0' }
                        }
                    }
                },
            },
        };
    </script>
    <style>
        body {
            background-color: #050608;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        /* ── Easter Eggs ── */
        @keyframes dice-spin {
            0% {
                transform: rotate(0deg) scale(1);
            }

            25% {
                transform: rotate(180deg) scale(1.4);
            }

            75% {
                transform: rotate(540deg) scale(1.4);
            }

            100% {
                transform: rotate(720deg) scale(1);
            }
        }

        .dice-spinning {
            animation: dice-spin 0.75s cubic-bezier(0.36, 0.07, 0.19, 0.97) both !important;
        }

        #dice-result-badge {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            background: rgba(15, 10, 30, 0.95);
            border: 1px solid rgba(168, 85, 247, 0.6);
            border-radius: 0.6rem;
            padding: 2px 10px;
            font-size: 0.8rem;
            font-weight: 900;
            color: white;
            white-space: nowrap;
            pointer-events: none;
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
            opacity: 0;
            z-index: 200;
            box-shadow: 0 0 12px rgba(168, 85, 247, 0.5);
        }

        #dice-result-badge.visible {
            transform: translateX(-50%) scale(1);
            opacity: 1;
        }

        #dice-result-badge.nat20 {
            color: #fbbf24;
            border-color: #fbbf24;
            box-shadow: 0 0 20px #fbbf2488;
        }

        #dice-result-badge.crit {
            color: #f87171;
            border-color: #f87171;
            box-shadow: 0 0 20px #f8717188;
        }

        #dice-result-badge.high {
            color: #34d399;
            border-color: #34d399;
            box-shadow: 0 0 12px #34d39944;
        }

        /* Dice rain (Konami) */
        #dice-rain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }

        .rain-die {
            position: absolute;
            top: -60px;
            font-size: 2.2rem;
            animation: rain-fall linear forwards;
            opacity: 0.85;
        }

        @keyframes rain-fall {
            to {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Gottmodus banner */
        #gottmodus-banner {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.25), rgba(59, 130, 246, 0.25));
            border: 1px solid rgba(168, 85, 247, 0.5);
            backdrop-filter: blur(16px);
            border-radius: 1rem;
            padding: 12px 28px;
            color: white;
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            z-index: 9998;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.4);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
        }

        #gottmodus-banner.visible {
            transform: translateX(-50%) translateY(0);
        }

        .bg-obsidian {
            background-color: #050608;
            background-image:
                radial-gradient(at 10% 10%, rgba(88, 28, 135, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(30, 64, 175, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
        }

        .glass-panel {
            background: rgba(20, 22, 28, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-panel:hover {
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.5),
                inset 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .glass-highlight {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.15);
        }

        .text-glow-purple {
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.6);
        }

        .text-glow-blue {
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
        }

        .text-glow-green {
            text-shadow: 0 0 15px rgba(34, 197, 94, 0.6);
        }

        .text-glow-cyan {
            text-shadow: 0 0 15px rgba(6, 182, 212, 0.6);
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            z-index: -1;
            opacity: 0.5;
            pointer-events: none;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .refraction-edge {
            position: relative;
            overflow: hidden;
        }

        .refraction-edge::before {
            content: '';
            position: absolute;
            top: 0;
            left: -50%;
            width: 200%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.03), transparent);
            transform: skewX(-25deg);
            pointer-events: none;
            transition: 0.5s;
        }

        .refraction-edge:hover::before {
            transform: skewX(-25deg) translateX(50%);
        }

        .glass-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            font-size: 1rem;
            transition: all 0.3s ease;
            width: 100%;
        }

        .glass-input:focus {
            outline: none;
            border-color: rgba(168, 85, 247, 0.5);
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.2);
            background: rgba(0, 0, 0, 0.4);
        }
    </style>
</head>

<body class="bg-obsidian min-h-screen flex flex-col font-sans selection:bg-neon-purple selection:text-white">
    <!-- Liquid Orbs Background -->
    <div class="orb w-[600px] h-[600px] bg-purple-600/30 top-[-100px] left-[-100px] animate-orb-move"></div>
    <div class="orb w-[500px] h-[500px] bg-blue-600/30 bottom-[10%] right-[-100px] animate-orb-move"
        style="animation-delay: -5s;"></div>
    <div class="orb w-[400px] h-[400px] bg-cyan-500/20 top-[40%] left-[30%] animate-pulse-slow"></div>

    <nav class="fixed top-0 w-full z-50 px-6 py-4">
        <div
            class="glass-panel max-w-7xl mx-auto rounded-xl px-6 py-3 flex justify-between items-center refraction-edge">
            <a href="{% url 'dashboard' %}" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
                <!-- Easter Egg #1: Würfel-Klick rollt einen d20 -->
                <span id="nav-dice"
                    class="material-symbols-outlined text-neon-purple text-3xl animate-float relative cursor-pointer select-none"
                    title="Klick mich!" onclick="rollNavDice(event)">casino
                    <span id="dice-result-badge"></span>
                </span>
                <!-- Easter Egg #3: 5× klicken = Gottmodus -->
                <span id="logo-text"
                    class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white via-purple-200 to-white tracking-tight text-glow-purple cursor-default select-none"
                    onclick="gottmodusClick()">DiceDock</span>
            </a>
            <div class="flex items-center gap-6 text-sm font-medium">
                {% if user.is_authenticated %}
                <span class="text-gray-300 hidden md:inline">Willkommen, {{ user.username }}!</span>
                <form action="{% url 'logout' %}" method="post" class="inline">
                    {% csrf_token %}
                    <button type="submit"
                        class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 text-gray-300 hover:text-white transition-all text-xs font-semibold uppercase tracking-wider flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm">logout</span> Abmelden
                    </button>
                </form>
                {% else %}
                <a href="{% url 'login' %}"
                    class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 text-gray-300 hover:text-white transition-all text-xs font-semibold uppercase tracking-wider">Anmelden</a>
                <a href="{% url 'register' %}"
                    class="px-4 py-2 rounded-lg bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 text-white transition-all text-xs font-semibold uppercase tracking-wider shadow-[0_0_15px_rgba(168,85,247,0.4)] hover:shadow-[0_0_25px_rgba(168,85,247,0.6)]">Registrieren</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="flex-grow flex flex-col justify-start p-6 pt-32 pb-12 w-full max-w-7xl mx-auto relative z-10 gap-6">
        {% block content %}
        {% endblock %}
    </main>
    {% block extra_scripts %}{% endblock %}

    <!-- Easter Egg Overlays -->
    <div id="dice-rain"></div>
    <div id="gottmodus-banner">⚔️ &nbsp;GOTTMODUS AKTIVIERT&nbsp; ⚔️</div>

    <script>
        // ── Easter Egg #1: Würfel im Navbar ─────────────────────────────────────
        const DICE_EMOJIS = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
        const DICE_FACES = ['🎲', '🎯', '🃏', '🎰', '♟️', '🎮'];
        let diceRollTimer = null;

        function rollNavDice(e) {
            e.preventDefault();
            e.stopPropagation();

            const icon = document.getElementById('nav-dice');
            const badge = document.getElementById('dice-result-badge');

            // Spin animation
            icon.classList.remove('dice-spinning');
            void icon.offsetWidth; // reflow
            icon.classList.add('dice-spinning');

            // Roll d20
            const roll = Math.floor(Math.random() * 20) + 1;
            let label = `d20: ${roll}`;
            badge.className = ''; // reset classes
            badge.id = 'dice-result-badge';

            if (roll === 20) {
                label = `🌟 NAT 20!`;
                badge.classList.add('nat20');
            } else if (roll === 1) {
                label = `💀 PATZER!`;
                badge.classList.add('crit');
            } else if (roll >= 15) {
                badge.classList.add('high');
            }

            badge.textContent = label;
            badge.classList.add('visible');

            clearTimeout(diceRollTimer);
            diceRollTimer = setTimeout(() => badge.classList.remove('visible'), 2200);
        }

        // ── Easter Egg #2: Konami-Code → Würfelregen ────────────────────────────
        const KONAMI = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown',
            'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'];
        let konamiIdx = 0;

        document.addEventListener('keydown', (e) => {
            if (e.key === KONAMI[konamiIdx]) {
                konamiIdx++;
                if (konamiIdx === KONAMI.length) {
                    konamiIdx = 0;
                    triggerDiceRain();
                }
            } else {
                konamiIdx = e.key === KONAMI[0] ? 1 : 0;
            }
        });

        function triggerDiceRain() {
            const rain = document.getElementById('dice-rain');
            const symbols = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅', '🎲', '🎯', '🎰', 'd20', '1', '20'];
            const colors = ['#a855f7', '#3b82f6', '#06b6d4', '#22c55e', '#f59e0b', '#ec4899'];
            let count = 0;
            const interval = setInterval(() => {
                if (count++ > 60) { clearInterval(interval); return; }
                const el = document.createElement('span');
                el.className = 'rain-die';
                el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                el.style.left = `${Math.random() * 100}vw`;
                el.style.color = colors[Math.floor(Math.random() * colors.length)];
                const dur = 1.4 + Math.random() * 2;
                el.style.animationDuration = `${dur}s`;
                el.style.animationDelay = `${Math.random() * 0.8}s`;
                el.style.fontSize = `${1.5 + Math.random() * 2}rem`;
                el.style.filter = `drop-shadow(0 0 8px currentColor)`;
                rain.appendChild(el);
                setTimeout(() => el.remove(), (dur + 1) * 1000);
            }, 60);
        }

        // ── Easter Egg #3: Logo-Text 5× klicken → Gottmodus ────────────────────
        let logoClicks = 0;
        let logoTimer = null;
        const banner = document.getElementById('gottmodus-banner');

        function gottmodusClick() {
            logoClicks++;
            clearTimeout(logoTimer);
            logoTimer = setTimeout(() => logoClicks = 0, 1500);

            if (logoClicks >= 5) {
                logoClicks = 0;
                banner.classList.add('visible');
                triggerDiceRain();
                setTimeout(() => banner.classList.remove('visible'), 4000);
            }
        }
    </script>
</body>

</html>
