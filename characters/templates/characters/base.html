{% load static %}
<!DOCTYPE html>
<html class="dark" lang="de">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>{% block title %}DiceDock{% endblock %}</title>
    <link href="{% static 'characters/css/tailwind.css' %}" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
</head>

<body class="bg-obsidian min-h-screen flex flex-col font-sans selection:bg-neon-purple selection:text-white">
    <!-- Liquid Orbs Background -->
    <div class="orb w-[600px] h-[600px] bg-purple-600/30 top-[-100px] left-[-100px] animate-orb-move"></div>
    <div class="orb w-[500px] h-[500px] bg-blue-600/30 bottom-[10%] right-[-100px] animate-orb-move"
        style="animation-delay: -5s;"></div>
    <div class="orb w-[400px] h-[400px] bg-cyan-500/20 top-[40%] left-[30%] animate-pulse-slow"></div>

    <nav class="fixed top-0 w-full z-50 px-6 py-4">
        <div
            class="glass-panel max-w-7xl mx-auto rounded-xl px-6 py-3 flex justify-between items-center refraction-edge">
            <a href="{% url 'dashboard' %}" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
                <span id="nav-dice"
                    class="material-symbols-outlined text-neon-purple text-3xl animate-float relative cursor-pointer select-none"
                    title="Würfeln!" onclick="rollDice(event)">casino<span id="dice-result"></span></span>
                <span
                    class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white via-purple-200 to-white tracking-tight text-glow-purple">DiceDock</span>
            </a>
            <div class="flex items-center gap-6 text-sm font-medium">
                {% if user.is_authenticated %}
                <span class="text-gray-300 hidden md:inline">Willkommen, {{ user.username }}!</span>
                <form action="{% url 'logout' %}" method="post" class="inline">
                    {% csrf_token %}
                    <button type="submit"
                        class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 text-gray-300 hover:text-white transition-all text-xs font-semibold uppercase tracking-wider flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm">logout</span> Abmelden
                    </button>
                </form>
                {% else %}
                <a href="{% url 'login' %}"
                    class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 text-gray-300 hover:text-white transition-all text-xs font-semibold uppercase tracking-wider">Anmelden</a>
                <a href="{% url 'register' %}"
                    class="px-4 py-2 rounded-lg bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 text-white transition-all text-xs font-semibold uppercase tracking-wider shadow-[0_0_15px_rgba(168,85,247,0.4)] hover:shadow-[0_0_25px_rgba(168,85,247,0.6)]">Registrieren</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="flex-grow flex flex-col justify-start p-6 pt-32 pb-12 w-full max-w-7xl mx-auto relative z-10 gap-6">
        {% block content %}
        {% endblock %}
    </main>
    {% block extra_scripts %}{% endblock %}

    <!-- Konami Dice Rain Overlay -->
    <div id="dice-rain"></div>

    <script>
        // ── Würfel Easter Egg ───────────────────────────────────────────────────
        const DICE_FACES = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
        let isRolling = false;
        let resultTimer = null;

        function rollDice(e) {
            e.preventDefault();
            e.stopPropagation();
            if (isRolling) return;
            isRolling = true;

            const icon = document.getElementById('nav-dice');
            const badge = document.getElementById('dice-result');
            const result = Math.floor(Math.random() * 6) + 1;

            // Spin animation
            icon.classList.remove('dice-rolling');
            void icon.offsetWidth;
            icon.classList.add('dice-rolling');

            // Ergebnis nach Animation zeigen
            badge.classList.remove('show');
            clearTimeout(resultTimer);

            setTimeout(() => {
                badge.textContent = DICE_FACES[result - 1];
                badge.classList.add('show');
                icon.classList.remove('dice-rolling');
                resultTimer = setTimeout(() => badge.classList.remove('show'), 2500);
                isRolling = false;
            }, 900);
        }

        // ── Konami-Code → Würfelregen ────────────────────────────────────────────
        const KONAMI = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown',
            'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'];
        let konamiIdx = 0;

        document.addEventListener('keydown', (e) => {
            if (e.key === KONAMI[konamiIdx]) {
                konamiIdx++;
                if (konamiIdx === KONAMI.length) {
                    konamiIdx = 0;
                    triggerDiceRain();
                }
            } else {
                konamiIdx = e.key === KONAMI[0] ? 1 : 0;
            }
        });

        function triggerDiceRain() {
            const rain = document.getElementById('dice-rain');
            const symbols = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅', '🎲'];
            const colors = ['#a855f7', '#3b82f6', '#06b6d4', '#22c55e', '#f59e0b', '#ec4899'];
            let count = 0;
            const interval = setInterval(() => {
                if (count++ > 60) { clearInterval(interval); return; }
                const el = document.createElement('span');
                el.className = 'rain-die';
                el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                el.style.left = `${Math.random() * 100}vw`;
                el.style.color = colors[Math.floor(Math.random() * colors.length)];
                const dur = 1.4 + Math.random() * 2;
                el.style.animationDuration = `${dur}s`;
                el.style.animationDelay = `${Math.random() * 0.8}s`;
                el.style.fontSize = `${1.5 + Math.random() * 2}rem`;
                el.style.filter = `drop-shadow(0 0 8px currentColor)`;
                rain.appendChild(el);
                setTimeout(() => el.remove(), (dur + 1) * 1000);
            }, 60);
        }
    </script>
</body>

</html>
