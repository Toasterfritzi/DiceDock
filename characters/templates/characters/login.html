{% extends 'characters/base.html' %}

{% block title %}Login - DiceDock{% endblock %}

{% block content %}
<h2>Login</h2>
<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Login</button>
</form>
<p style="margin-top: 1rem;">Don't have an account? <a href="{% url 'register' %}" style="color: #bb86fc;">Register
        here</a>.</p>
{% endblock %}
